# Sweep #3: tune_inner_cv across N=200/300/400 × baseline=1/3.
# Comparison protocol to nested_cv — emits overfit_auc / overfit_f1 columns
# in per_seed_metrics.csv that nested_cv cannot produce.
#
# Ordering constraint: must run AFTER sweep #2 (production) because the
# {slug} symlinks under runs/validation/ get repointed to whichever
# validation protocol ran last. Running tune_inner_cv last preserves the
# production-from-nested_cv lookups during sweep #2.
#
# Expected runtime: 6 runs × ~30 min ≈ ~3h sequential on one node.

template: ../rf.yaml
mode: validation
tuning_protocol: tune_inner_cv
sweep_id: rf_tune_inner_n_x_baseline_20260516

axes:
  N: [200, 300, 400]
  baseline_cycle: [1, 3]

fixed:
  model: random_forest
  db_version: A2.2
  feature_subset: fs_cv
  seeds_preset: fresh
  test_frac: 0.2
  tune:
    n_trials: 100
    inner_cv: 5
    optimize: f1
