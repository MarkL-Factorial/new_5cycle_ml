schema_version: 1
description: |
  Column-role manifest for ml_label_preprocess outputs.

  schema_version: bump whenever the column set or roles change. v3 keeps
  the same 41-column cell_features schema and 17-column cell_labels
  schema as v2, so schema_version stays at 1.

  Each column belongs to exactly ONE role. Downstream ML training
  scripts MUST consult this manifest to filter columns by role,
  preventing data leakage.

  Maintenance contract: any column added to labels.py or features.py
  MUST also be added here in the same commit. features.py runs a
  consistency check at startup that aborts if SCHEMA and this file
  disagree.

roles:
  meta:
    ml_input: false
    note: |
      Known at prediction time (i.e. by the end of cycle 5) but NOT
      trained on. Two sub-flavors:
        - Setup-time descriptors fixed at cell birth: identifiers
          (cell_name, cohort), design / protocol slots (protocol_pattern),
          cycle-1 baseline measurements (baseline_dis_ah).
        - Upstream toolkit classifications derived from analyzing the
          cycling protocol (cycling_consistency). Could change between
          toolkit versions.
      Use for identification, stratification, or eligibility filtering.
      Never as ML input — the choice not to train on them is conservative
      (avoids cohort / protocol confounds), not a leakage requirement.

  label:
    ml_input: false
    note: |
      TARGETS / outcomes. Any column that requires observing the cell
      PAST cycle 5 to compute (status, last_fade_cycle, final_retention,
      n_regular, the per-N label_n{N} columns, etc.). Hard-fail if used
      as feature input — this would be data leakage.

  feature:
    ml_input: true
    note: |
      Model input. Strictly derived from cycles 1–5 only. Safe to train
      on. features.py runs a manifest-consistency check at startup to
      guard against drift between this list and the in-code SCHEMA.

  quality:
    ml_input: false
    note: |
      Diagnostics about feature-extraction success (cv_n_success, fit
      error messages, fit-parameter dumps). Use to filter rows before
      training (e.g. cv_n_success == 3 for the strictest set), never as
      features themselves.

datasets:

  cell_labels:
    path: datasets/{db_version}_b{baseline_cycle}/cell_labels.parquet
    one_row_per: cell
    sort_order: [cohort, cell_name]
    columns:
      - name: cell_name
        role: meta
        dtype: string
        nullable: false
      - name: cohort
        role: meta
        dtype: string
      - name: protocol_pattern
        role: meta
        dtype: string
      - name: cycling_consistency
        role: meta
        dtype: string
        note: |
          Upstream toolkit classification of the cell's protocol pattern
          (single_rate / rate_changed / no_regular). Already used by
          features.py as an eligibility filter (only single_rate cells
          get feature rows). Known at prediction time → safe to expose,
          but we still don't train on it (avoids protocol-confound
          shortcuts where the model just learns "this protocol always
          fades fast").
      - name: status
        role: label
        dtype: string
        enum: [excluded, faded, in_testing]
        leakage_risk: high
      - name: exclusion_reason
        role: label
        dtype: string
        nullable: true
      - name: last_fade_cycle
        role: label
        dtype: int
        nullable: true
        leakage_risk: high
      - name: n_regular
        role: label
        dtype: int
        leakage_risk: high
        note: |
          Max regular_cycle observed for this cell. NOT known at
          prediction time (first 5 cycles) — it is the right-censoring
          follow-up length, only available AFTER the cell has finished
          cycling. Using as feature directly leaks pass/censor/bad
          membership (cells with larger n_regular are more likely
          'pass' or 'bad' than 'censor'). The only legitimate use is
          as the follow-up time in an explicit survival model — that
          framing must be opt-in, not implicit.
      - name: baseline_dis_ah
        role: meta
        dtype: float
        nullable: true
        note: "Per-cell normalizer (cycle-1 discharge capacity)."
      - name: final_retention
        role: label
        dtype: float
        nullable: true
        leakage_risk: high
        note: "Whole-trajectory summary, NOT a 5-cycle feature."
      - name: n_recovered_crossings
        role: label
        dtype: int
        note: "Derived from full retention curve, beyond cycle-5 window."

      # --- N-threshold ML classification labels (binary: pass vs bad) ---
      # For each N ∈ {200, 300, 400}, label_n{N} categorises the cell:
      #   pass     — retention stayed >=0.85 strictly past cycle N
      #   bad      — retention fell at or before cycle N
      #   censor   — cell hasn't reached N yet and hasn't faded (DO NOT TRAIN)
      #   excluded — cell was upstream-excluded
      # trainable_n{N} == True iff label ∈ {pass, bad}.
      # See labels.py::_classification_label_at for the decision table.
      - name: label_n200
        role: label
        dtype: string
        enum: [pass, bad, censor, excluded]
        leakage_risk: high
        note: "Survives past 200 cycles healthy."
      - name: trainable_n200
        role: label
        dtype: bool
        note: "True for the binary-classifiable subset at N=200 (filters out censor and excluded)."
      - name: label_n300
        role: label
        dtype: string
        enum: [pass, bad, censor, excluded]
        leakage_risk: high
        note: "Survives past 300 cycles healthy."
      - name: trainable_n300
        role: label
        dtype: bool
        note: "True for the binary-classifiable subset at N=300."
      - name: label_n400
        role: label
        dtype: string
        enum: [pass, bad, censor, excluded]
        leakage_risk: high
        note: "Survives past 400 cycles healthy."
      - name: trainable_n400
        role: label
        dtype: bool
        note: "True for the binary-classifiable subset at N=400."

  cell_features:
    path: datasets/{db_version}_b{baseline_cycle}/cell_features.parquet
    one_row_per: cell
    sort_order: [cell_name]
    filter: "n_regular >= 5 AND first regular_cycle == 1 AND baselines > 0"
    note: |
      Intentionally minimal schema: ONLY cell_name (join key) plus the
      40 feature columns. Cohort / protocol_pattern / baselines live in
      cell_labels.parquet — join on cell_name to get them. cv_n_success
      is NOT emitted here either; recover it by aggregating
      cell_features_status.csv:
        status.group_by("cell_name").agg(pl.col("success").sum()
                .alias("cv_n_success"))
      This keeps cell_features a clean (id, X) training matrix with no
      meta columns to accidentally feed into the model.
    columns:
      # --- join key (only meta column in this file) ---
      - { name: cell_name, role: meta, dtype: string, nullable: false }

      # --- Tier A: from annotation JSON scalars (cycles 1-5) ---
      - name: coulombic_efficiency_final
        role: feature
        tier: A
        dtype: float
        unit: percent
        source: "cd_events[c5].coulombic_efficiency * 100"
        note: |
          Emitted as PERCENT to match legacy reference convention
          (BOL_with_cv_features.csv, solstice_mlflow). Annotation JSON
          stores CE as fraction; features.py multiplies by 100.
      - name: discharge_capacity_retention_final
        role: feature
        tier: A
        dtype: float
        source: "cap_dis[c5] / cap_dis[c1]"
      - name: charge_capacity_retention_min
        role: feature
        tier: A
        dtype: float
        source: "min(cap_chg[c1..c5]) / cap_chg[c1]"

      # --- Tier B: nominal voltage retention over cycles 1..5 (Stage B, implemented) ---
      # nominal_V = abs(∫V·I·dt / ∫I·dt) per phase per cycle, then ratio'd
      # against cycle 1. Computed in preprocess.py via manual trapezoid on
      # (current, voltage, elapsed_time) from load_raw_tagged.
      - { name: discharge_nominal_voltage_retention_max, role: feature, tier: B, dtype: float, nullable: true,
          source: "max(v_nom_dis[c1..c5] / v_nom_dis[c1])" }
      - { name: discharge_nominal_voltage_retention_std, role: feature, tier: B, dtype: float, nullable: true,
          source: "stdev(v_nom_dis[c1..c5] / v_nom_dis[c1]) (sample std, ddof=1)" }
      - { name: charge_nominal_voltage_retention_max,    role: feature, tier: B, dtype: float, nullable: true,
          source: "max(v_nom_chg[c1..c5] / v_nom_chg[c1])" }

      # --- Tier C per-cycle KWW fit outputs (Stage C, implemented) ---
      # fit_kww_fast_exp from battery_workbench.core.analysis.cv_fitting.
      # I(t) = A_fast·exp(-t/tau_fast) + A_slow·exp(-(t/tau_slow)^beta).
      # Per-cycle scalars are NaN when the fit failed (non-converged OR
      # pinned-to-bound). cv_n_success in {0..3} reports how many of
      # c3/c4/c5 succeeded. See cell_features_status.csv in the bundle dir for details.
      - { name: cv_A_fast_frac_c3, role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_A_fast_frac_c4, role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_A_fast_frac_c5, role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_fast_c3,    role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_fast_c4,    role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_fast_c5,    role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_slow_c3,    role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_slow_c4,    role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_slow_c5,    role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_beta_c3,        role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_beta_c4,        role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_beta_c5,        role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_ratio_c3,   role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_ratio_c4,   role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_ratio_c5,   role: feature, tier: C, dtype: float, nullable: true }

      # --- Tier C aggregated mean/std/delta over (c3, c4, c5) ---
      # mean = np.nanmean, std = np.nanstd (ddof=0), delta = c5 − c3.
      # nanmean/nanstd let partial-fit cells still produce finite agg.
      # delta is NaN unless both c3 and c5 are finite (needs endpoints).
      - { name: cv_A_fast_frac_mean,  role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_A_fast_frac_std,   role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_A_fast_frac_delta, role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_fast_mean,     role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_fast_std,      role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_fast_delta,    role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_slow_mean,     role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_slow_std,      role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_slow_delta,    role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_beta_mean,         role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_beta_std,          role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_beta_delta,        role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_ratio_mean,    role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_ratio_std,     role: feature, tier: C, dtype: float, nullable: true }
      - { name: cv_tau_ratio_delta,   role: feature, tier: C, dtype: float, nullable: true }

      # --- Tier C engineered A-ratio (derived from cv_A_fast_frac_c{3,4,5}) ---
      # Mirrors experiment_cv_features/.../00_engineer_features.py:50-76.
      # safe_ratio (eps=0.5 percent) guards against tiny A_fast_frac.
      # r_c = safe_ratio(100 − f_c, f_c); A_slow_to_fast_mean = nanmean(r3,r4,r5);
      # A_slow_to_fast_delta = r5 − r3; log version uses safe_log_abs;
      # A_fast_frac_cv = safe_ratio(nanstd(f), |nanmean(f)|).
      - { name: A_slow_to_fast_mean,      role: feature, tier: C, dtype: float, nullable: true }
      - { name: A_slow_to_fast_delta,     role: feature, tier: C, dtype: float, nullable: true }
      - { name: log_A_slow_to_fast_delta, role: feature, tier: C, dtype: float, nullable: true }
      - { name: A_fast_frac_cv,           role: feature, tier: C, dtype: float, nullable: true }

      # cv_n_success (quality) was previously written here. It is now
      # excluded from cell_features.parquet — recover via:
      #   status.group_by("cell_name").agg(pl.col("success").sum())
      # against cell_features_status.csv in the same bundle dir (per-cycle fit log).

  cell_features_status:
    path: datasets/{db_version}_b{baseline_cycle}/cell_features_status.csv
    one_row_per: "(cell_name, regular_cycle)"
    written_at_stage: C
    purpose: |
      Diagnostics only. Per-(cell, cycle) KWW fit attempt log. Never
      trained on. Provides visibility into how many cells/cycles had
      to fall back to null Tier-C features and why.
    columns:
      - { name: cell_name,     role: meta,    dtype: string }
      - { name: regular_cycle, role: meta,    dtype: int }
      - { name: cd_index,      role: meta,    dtype: int }
      - { name: success,       role: quality, dtype: bool,
          note: "True only when scipy converged AND _within_bounds passed." }
      - { name: error_msg,     role: quality, dtype: string,
          note: "Empty when success. Failure modes: 'extract: ...', 'fit: ...', 'non-converged: ...', 'pinned-to-bound'." }
      - { name: tau_fast,      role: quality, dtype: float, nullable: true }
      - { name: tau_slow,      role: quality, dtype: float, nullable: true }
      - { name: A_fast_frac,   role: quality, dtype: float, nullable: true }
      - { name: beta,          role: quality, dtype: float, nullable: true }
      - { name: r_squared,     role: quality, dtype: float, nullable: true }

subsets:
  fs_cv:
    description: "The 12 features used in report_M2_vs_lean8_vs_CV_20260501."
    members:
      - coulombic_efficiency_final
      - discharge_capacity_retention_final
      - charge_capacity_retention_min
      - discharge_nominal_voltage_retention_max
      - discharge_nominal_voltage_retention_std
      - charge_nominal_voltage_retention_max
      - cv_tau_ratio_c3
      - cv_tau_ratio_mean
      - A_slow_to_fast_mean
      - A_slow_to_fast_delta
      - log_A_slow_to_fast_delta
      - A_fast_frac_cv
